<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreamMBTI · 奶油人格测试</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root{
  --bg-page:#FDFBF7;
  --bg:#FFFFFF;
  --sh-up:0 2px 16px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);
  --sh-deep:0 12px 48px rgba(0,0,0,.14),0 3px 12px rgba(0,0,0,.07);
  --t1:#0D1117;--t2:#1F2937;--tm:#4B5563;--t3:#9CA3AF;
  --accent:#b48ae0;
  --accent-light:rgba(180,138,224,.12);
  --r-sm:12px;--r-md:18px;--r-lg:24px;--r-xl:32px;
  --font-d:'Nunito',sans-serif;
  --font-b:'Noto Sans SC',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:var(--font-b);
  background:var(--bg-page);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  color:var(--t2);
}
.screen{display:none;}
.screen.active{display:block;}

/* ══ LANDING ══ */
#screen-landing{
  min-height:100vh;display:none;
  flex-direction:column;align-items:center;justify-content:center;
  padding:40px 20px 80px;
  background:linear-gradient(155deg,#fdf0ff 0%,#fdfbf7 45%,#eff6ff 100%);
  position:relative;overflow:hidden;
}
#screen-landing.active{display:flex;}
.deco{position:absolute;border-radius:50%;filter:blur(70px);opacity:.3;pointer-events:none;}
.d1{width:500px;height:500px;background:#e9d5ff;top:-120px;left:-150px;}
.d2{width:400px;height:400px;background:#fce7f3;top:80px;right:-100px;}
.d3{width:360px;height:360px;background:#dbeafe;bottom:-80px;left:25%;}

.land-in{position:relative;z-index:1;max-width:560px;width:100%;text-align:center;}
.land-badge{
  display:inline-block;padding:6px 18px;border-radius:20px;
  background:var(--accent-light);color:var(--accent);
  font-family:var(--font-d);font-size:13px;font-weight:900;letter-spacing:2px;
  margin-bottom:24px;
}
.land-title{
  font-family:var(--font-d);font-size:clamp(40px,9vw,68px);font-weight:900;
  line-height:1.08;color:var(--t1);margin-bottom:14px;
}
.land-title em{color:var(--accent);font-style:normal;}
.land-sub{font-size:15px;color:var(--tm);line-height:1.7;margin-bottom:32px;}
.land-pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:36px;}
.pill{
  padding:7px 16px;border-radius:18px;font-size:12px;font-weight:700;
  background:rgba(255,255,255,.8);backdrop-filter:blur(8px);
  box-shadow:0 1px 6px rgba(0,0,0,.07);color:var(--tm);
}
.btn-start{
  display:inline-flex;align-items:center;gap:10px;
  padding:17px 50px;
  background:linear-gradient(135deg,#b48ae0 0%,#f4a7c3 100%);
  color:#fff;border:none;border-radius:var(--r-xl);
  font-family:var(--font-b);font-size:17px;font-weight:900;cursor:pointer;
  box-shadow:0 6px 24px rgba(180,138,224,.42);transition:.25s;
}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(180,138,224,.52);}
.hist-btn{
  display:block;margin:18px auto 0;background:none;
  border:2px solid rgba(180,138,224,.25);color:var(--accent);
  padding:9px 28px;border-radius:20px;font-weight:700;font-size:13px;
  cursor:pointer;transition:.2s;
}
.hist-btn:hover{background:var(--accent-light);}

/* ══ QUIZ ══ */
#screen-quiz{
  min-height:100vh;padding:40px 20px 80px;
  background:linear-gradient(155deg,#fdf0ff 0%,#fdfbf7 50%,#eff6ff 100%);
}
.quiz-wrap{max-width:640px;margin:0 auto;}
.quiz-hd{text-align:center;margin-bottom:28px;}
.quiz-hd h2{font-family:var(--font-d);font-size:20px;font-weight:900;color:var(--t1);}
.quiz-hd p{font-size:13px;color:var(--t3);margin-top:4px;}
.prog-wrap{background:#ede8f5;border-radius:8px;height:7px;margin-bottom:6px;overflow:hidden;}
.prog-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#b48ae0,#f4a7c3);transition:.4s ease;}
.prog-txt{font-size:11px;color:var(--t3);text-align:right;margin-bottom:22px;}

.q-card{
  background:#fff;border-radius:var(--r-lg);padding:34px 28px;
  box-shadow:var(--sh-up);animation:up .28s ease;
}
@keyframes up{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
.q-tag{
  display:inline-block;padding:3px 12px;border-radius:10px;
  font-size:11px;font-weight:800;letter-spacing:.5px;margin-bottom:14px;
}
.q-text{font-size:16px;font-weight:700;color:var(--t1);line-height:1.65;margin-bottom:26px;}
.scale-ends{display:flex;justify-content:space-between;margin-bottom:10px;}
.scale-end{font-size:11px;color:var(--tm);font-weight:600;max-width:140px;line-height:1.3;}
.scale-end:last-child{text-align:right;}
.scale-row{display:flex;gap:7px;justify-content:center;align-items:center;}
.s-btn{
  border:2px solid #e8e0f3;background:transparent;border-radius:50%;
  cursor:pointer;transition:.16s;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-d);font-weight:800;color:#c4b8d8;flex-shrink:0;
}
.s-btn:nth-child(1),.s-btn:nth-child(7){width:34px;height:34px;font-size:11px;}
.s-btn:nth-child(2),.s-btn:nth-child(6){width:38px;height:38px;font-size:12px;}
.s-btn:nth-child(3),.s-btn:nth-child(5){width:42px;height:42px;font-size:13px;}
.s-btn:nth-child(4){width:46px;height:46px;font-size:14px;}
.s-btn:hover{border-color:var(--accent);color:var(--accent);transform:scale(1.1);}
.s-btn.sel{
  background:linear-gradient(135deg,#b48ae0,#f4a7c3);
  border-color:transparent;color:#fff;
  box-shadow:0 2px 12px rgba(180,138,224,.4);transform:scale(1.12);
}
.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:14px;}
.btn-prev,.btn-next{
  padding:11px 26px;border-radius:var(--r-sm);border:none;
  font-family:var(--font-b);font-size:14px;font-weight:700;cursor:pointer;transition:.2s;
}
.btn-prev{background:#fff;box-shadow:0 1px 6px rgba(0,0,0,.08);color:var(--tm);}
.btn-prev:hover{box-shadow:var(--sh-up);}
.btn-next{
  background:linear-gradient(135deg,#b48ae0,#f4a7c3);color:#fff;
  box-shadow:0 3px 14px rgba(180,138,224,.35);
}
.btn-next:hover{transform:translateY(-1px);box-shadow:0 5px 20px rgba(180,138,224,.48);}
.btn-next:disabled{opacity:.45;cursor:not-allowed;transform:none;}

/* ══ RESULT ══ */
#screen-result{
  min-height:100vh;padding:40px 20px 80px;
  background:linear-gradient(155deg,#fdf0ff 0%,#fdfbf7 45%,#eff6ff 100%);
  display:none;align-items:flex-start;justify-content:center;
}
#screen-result.active{display:flex;}

/* 结果大卡片 */
.result-card{
  width:100%;max-width:480px;
  background:#fff;border-radius:var(--r-xl);
  box-shadow:var(--sh-deep);
  overflow:hidden;
  animation:up .4s ease;
}

/* 卡片上半：人格形象区 */
.rc-top{
  position:relative;
  padding:36px 32px 0;
  min-height:300px;
  display:flex;flex-direction:column;align-items:center;
  overflow:hidden;
}
.rc-bg-deco{
  position:absolute;inset:0;
  opacity:.12;
}
/* 分组颜色条 */
.rc-group-tag{
  position:relative;z-index:2;
  display:inline-block;padding:4px 14px;border-radius:12px;
  font-size:11px;font-weight:800;letter-spacing:1px;
  margin-bottom:16px;
  text-transform:uppercase;
}
/* SVG角色区 */
.rc-avatar{
  position:relative;z-index:2;
  width:180px;height:180px;
  margin-bottom:0;
  flex-shrink:0;
}
.rc-avatar svg{width:100%;height:100%;}

/* 卡片下半：信息区 */
.rc-info{
  padding:28px 32px 32px;
}
.rc-type-code{
  font-family:var(--font-d);font-size:38px;font-weight:900;
  letter-spacing:4px;line-height:1;margin-bottom:4px;
}
.rc-type-name{
  font-size:17px;font-weight:900;color:var(--t1);margin-bottom:6px;
}
.rc-dessert{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 14px;border-radius:14px;
  font-size:12px;font-weight:700;margin-bottom:14px;
}
.rc-slogan{
  font-size:13px;color:var(--tm);line-height:1.7;
  margin-bottom:22px;font-style:italic;
}
/* 三行关键词 */
.rc-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:22px;}
.rc-tag{
  padding:5px 13px;border-radius:12px;
  font-size:12px;font-weight:700;
}

/* 维度条 */
.dim-rows{display:flex;flex-direction:column;gap:10px;margin-bottom:26px;}
.dim-row{display:flex;align-items:center;gap:10px;}
.dim-lbl{font-size:11px;font-weight:700;color:var(--tm);width:72px;flex-shrink:0;}
.dim-track{flex:1;height:5px;background:#f0ebf8;border-radius:4px;overflow:hidden;}
.dim-fill{height:100%;border-radius:4px;transition:width .7s ease;}
.dim-pct{font-family:var(--font-d);font-size:12px;font-weight:800;width:32px;text-align:right;flex-shrink:0;}

/* 操作按钮 */
.rc-actions{display:flex;gap:10px;}
.act-btn{
  flex:1;padding:13px 0;border-radius:var(--r-md);border:none;
  font-family:var(--font-b);font-size:13px;font-weight:700;cursor:pointer;transition:.2s;
}
.act-primary{
  background:linear-gradient(135deg,#b48ae0,#f4a7c3);color:#fff;
  box-shadow:0 3px 14px rgba(180,138,224,.35);
}
.act-primary:hover{transform:translateY(-1px);box-shadow:0 5px 20px rgba(180,138,224,.48);}
.act-secondary{background:#f8f5ff;color:var(--tm);}
.act-secondary:hover{background:#f0e8ff;}

/* ══ HISTORY ══ */
#screen-history{min-height:100vh;padding:40px 20px 80px;background:var(--bg-page);}
.hist-wrap{max-width:520px;margin:0 auto;}
.hist-hd{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:24px;
}
.hist-hd h2{font-family:var(--font-d);font-size:22px;font-weight:900;color:var(--t1);}
.hist-item{
  background:#fff;border-radius:var(--r-md);padding:18px 20px;
  box-shadow:0 1px 6px rgba(0,0,0,.06);margin-bottom:10px;
  display:flex;align-items:center;gap:14px;cursor:pointer;transition:.2s;
}
.hist-item:hover{box-shadow:var(--sh-up);transform:translateX(3px);}
.hist-avatar-sm{width:44px;height:44px;flex-shrink:0;}
.hist-avatar-sm svg{width:100%;height:100%;}
.hist-info{flex:1;}
.hist-type{font-family:var(--font-d);font-size:15px;font-weight:900;}
.hist-name{font-size:12px;color:var(--tm);margin-top:2px;}
.hist-date{font-size:11px;color:var(--t3);margin-top:2px;}
.hist-empty{text-align:center;padding:60px 20px;color:var(--t3);font-size:14px;}

/* ══ MODAL ══ */
.modal-ov{
  position:fixed;inset:0;background:rgba(0,0,0,.55);
  z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;
}
.modal-ov.active{display:flex;}
.modal-box{
  background:#fff;border-radius:var(--r-xl);padding:28px;
  max-width:400px;width:100%;box-shadow:var(--sh-deep);text-align:center;
}
.modal-title{font-family:var(--font-d);font-size:16px;font-weight:900;color:var(--t1);margin-bottom:16px;}
#poster-preview{width:100%;border-radius:var(--r-md);box-shadow:0 2px 12px rgba(0,0,0,.1);margin-bottom:16px;}
.modal-btns{display:flex;gap:10px;justify-content:center;}

/* ══ POSTER SOURCE ══ */
#poster-src{
  position:fixed;left:-9999px;top:-9999px;width:420px;
  padding:36px 28px 28px;
  font-family:'Noto Sans SC',sans-serif;
}
.ps-top{display:flex;flex-direction:column;align-items:center;margin-bottom:20px;}
.ps-logo-txt{font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;letter-spacing:2px;color:#b48ae0;margin-bottom:14px;opacity:.7;}
.ps-avatar{width:140px;height:140px;}
.ps-avatar svg{width:100%;height:100%;}
.ps-code{font-family:'Nunito',sans-serif;font-size:42px;font-weight:900;letter-spacing:4px;margin:12px 0 4px;}
.ps-name{font-size:16px;font-weight:900;margin-bottom:6px;}
.ps-dessert{font-size:12px;margin-bottom:12px;padding:4px 14px;border-radius:12px;display:inline-block;}
.ps-slogan{font-size:12px;color:#6b7280;line-height:1.6;font-style:italic;margin-bottom:18px;text-align:center;}
.ps-dims{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.ps-dim{background:#faf6ff;border-radius:10px;padding:10px 12px;}
.ps-dim-lbl{font-size:10px;font-weight:700;color:#6b7280;margin-bottom:5px;}
.ps-dim-val{font-family:'Nunito',sans-serif;font-size:20px;font-weight:900;}
.ps-dim-bar{height:3px;background:#ede8f5;border-radius:3px;margin-top:4px;overflow:hidden;}
.ps-dim-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#b48ae0,#f4a7c3);}
.ps-brand{text-align:center;font-size:10px;color:#9ca3af;margin-top:4px;}

/* ══ COMPUTING ══ */
.computing{
  position:fixed;inset:0;background:rgba(253,251,247,.96);
  z-index:900;display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;
}
.computing.active{display:flex;}
.comp-icon{font-size:44px;animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
.comp-txt{font-size:15px;font-weight:700;color:var(--tm);}

/* ══ TOAST ══ */
.toast{
  position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#111827;color:#fff;padding:10px 22px;border-radius:18px;
  font-size:13px;font-weight:600;opacity:0;transition:.28s;z-index:2000;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ══ BRAND ══ */
.brand{
  position:fixed;bottom:16px;right:18px;
  font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.5px;
  pointer-events:none;z-index:500;font-family:var(--font-d);
}
</style>
</head>
<body>

<!-- LANDING -->
<div id="screen-landing" class="screen">
  <div class="deco d1"></div><div class="deco d2"></div><div class="deco d3"></div>
  <div class="land-in">
    <div class="land-badge">🍰 CreamMBTI</div>
    <h1 class="land-title">你是什么<br><em>甜品人格</em>？</h1>
    <p class="land-sub">28道场景题 · 7级量表 · 16款奶油人格形象</p>
    <div class="land-pills">
      <span class="pill">⏱ 约5分钟</span>
      <span class="pill">🎯 28题场景式</span>
      <span class="pill">🍮 16款甜品人设</span>
      <span class="pill">📸 一键生成海报</span>
    </div>
    <button class="btn-start" onclick="startQuiz()">开始测试 →</button>
    <button class="hist-btn" onclick="showHistory()">📋 历史记录</button>
  </div>
</div>

<!-- QUIZ -->
<div id="screen-quiz" class="screen">
  <div class="quiz-wrap">
    <div class="quiz-hd">
      <h2>🍰 CreamMBTI</h2>
      <p>选最符合你的，别想太多</p>
    </div>
    <div class="prog-wrap"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="prog-txt" id="prog-txt">0 / 28</div>
    <div id="q-box"></div>
    <div class="q-nav">
      <button class="btn-prev" id="btn-prev" onclick="prevQ()">← 上一题</button>
      <button class="btn-next" id="btn-next" onclick="nextQ()">下一题 →</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="screen-result" class="screen">
  <div class="result-card" id="result-card">
    <div class="rc-top" id="rc-top">
      <div class="rc-bg-deco" id="rc-bg-deco"></div>
      <div class="rc-group-tag" id="rc-group-tag"></div>
      <div class="rc-avatar" id="rc-avatar"></div>
    </div>
    <div class="rc-info">
      <div class="rc-type-code" id="rc-code"></div>
      <div class="rc-type-name" id="rc-name"></div>
      <div class="rc-dessert" id="rc-dessert"></div>
      <div class="rc-slogan" id="rc-slogan"></div>
      <div class="rc-tags" id="rc-tags"></div>
      <div class="dim-rows" id="dim-rows"></div>
      <div class="rc-actions">
        <button class="act-btn act-primary" onclick="showPoster()">📸 生成海报</button>
        <button class="act-btn act-secondary" onclick="startQuiz()">🔄 重测</button>
        <button class="act-btn act-secondary" onclick="showHistory()">📋 历史</button>
      </div>
    </div>
  </div>
</div>

<!-- HISTORY -->
<div id="screen-history" class="screen">
  <div class="hist-wrap">
    <div class="hist-hd">
      <h2>📋 历史记录</h2>
      <button class="act-btn act-secondary" style="padding:8px 16px;font-size:12px;" onclick="showScreen('screen-landing')">← 返回</button>
    </div>
    <div id="hist-list"></div>
  </div>
</div>

<!-- POSTER MODAL -->
<div class="modal-ov" id="poster-modal">
  <div class="modal-box">
    <div class="modal-title">📸 分享海报</div>
    <img id="poster-preview" alt="海报">
    <div class="modal-btns">
      <button class="act-btn act-primary" style="padding:11px 24px;flex:unset;" onclick="dlPoster()">💾 保存</button>
      <button class="act-btn act-secondary" style="padding:11px 24px;flex:unset;" onclick="closeModal()">关闭</button>
    </div>
  </div>
</div>

<!-- POSTER SOURCE -->
<div id="poster-src">
  <div class="ps-top">
    <div class="ps-logo-txt">CreamMBTI · 奶油人格测试</div>
    <div class="ps-avatar" id="ps-avatar"></div>
    <div class="ps-code" id="ps-code"></div>
    <div class="ps-name" id="ps-name-p"></div>
    <div class="ps-dessert" id="ps-dessert-p"></div>
    <div class="ps-slogan" id="ps-slogan-p"></div>
  </div>
  <div class="ps-dims" id="ps-dims"></div>
  <div class="ps-brand">© CreamViz by Alin</div>
</div>

<!-- COMPUTING -->
<div class="computing" id="computing">
  <div class="comp-icon">🔮</div>
  <div class="comp-txt">正在解析你的奶油人格……</div>
</div>

<div class="toast" id="toast"></div>
<div class="brand">© CreamViz by Alin</div>

<script>
// ══════════════════════════════════════════════
// 28道题目
// ══════════════════════════════════════════════
const QS=[
  {id:1,dim:'EI',left:'立刻换衣服冲过去',right:'假装手机没电',text:'周五晚上，朋友突然叫你去即兴聚会——嘈杂酒吧、全是陌生人。你的第一反应？'},
  {id:2,dim:'EI',left:'还行，下次想去更热闹的',right:'终于充上电了，这才叫度假',text:'独自旅行一周，全程没深聊过任何人。回到家后你感觉：'},
  {id:3,dim:'EI',left:'主动搭讪，聊完一圈再说',right:'找个角落观察，等人来找你',text:'在一个陌生的社交场合，你通常会：'},
  {id:4,dim:'EI',left:'马上找人讲，越讲越清晰',right:'自己消化一遍，确认后再说',text:'当你有一个很好的想法时，你倾向于：'},
  {id:5,dim:'EI',left:'继续和同事喝两杯放松',right:'回家关门，一个人发呆',text:'开了一整天会议，精力耗尽。你最想要：'},

// ══════════════════════════════════════════════
// 状态
// ══════════════════════════════════════════════
let ST={answers:new Array(28).fill(null),curQ:0,result:null};

// ══════════════════════════════════════════════
// 屏幕
// ══════════════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

// ══════════════════════════════════════════════
// 测试逻辑
// ══════════════════════════════════════════════
function startQuiz(){
  ST={answers:new Array(28).fill(null),curQ:0,result:null};
  showScreen('screen-quiz');
  renderQ(0);
}

function renderQ(idx){
  const q=QS[idx];
  const dimColor={EI:'rgba(180,138,224,.15)',SN:'rgba(123,198,230,.15)',TF:'rgba(244,114,182,.15)',JP:'rgba(250,200,88,.2)'};
  const dimTC={EI:'#8b5cf6',SN:'#0ea5e9',TF:'#ec4899',JP:'#d97706'};
  const dimName={EI:'外向 ↔ 内向',SN:'感觉 ↔ 直觉',TF:'思维 ↔ 情感',JP:'判断 ↔ 感知'};
  
  document.getElementById('q-box').innerHTML=`
    <div class="q-card">
      <div class="q-tag" style="background:${dimColor[q.dim]};color:${dimTC[q.dim]}">${dimName[q.dim]}</div>
      <div class="q-text">${q.text}</div>
      <div class="scale-ends">
        <span class="scale-end">${q.left}</span>
        <span class="scale-end">${q.right}</span>
      </div>
      <div class="scale-row">
        ${[1,2,3,4,5,6,7].map(v=>`<button class="s-btn${ST.answers[idx]===v?' sel':''}" onclick="pick(${idx},${v})">${v}</button>`).join('')}
      </div>
    </div>`;
  
  const done=ST.answers.filter(a=>a!==null).length;
  document.getElementById('prog-fill').style.width=(done/28*100)+'%';
  document.getElementById('prog-txt').textContent=`${done} / 28`;
  document.getElementById('btn-prev').style.visibility=idx===0?'hidden':'visible';
  const bn=document.getElementById('btn-next');
  bn.textContent=idx===27?'查看结果 🎉':'下一题 →';
  bn.disabled=ST.answers[idx]===null;
}

function pick(idx,val){ST.answers[idx]=val;renderQ(idx);}
function nextQ(){
  if(ST.answers[ST.curQ]===null)return;
  if(ST.curQ===27){calc();return;}
  ST.curQ++;renderQ(ST.curQ);
}
function prevQ(){if(ST.curQ===0)return;ST.curQ--;renderQ(ST.curQ);}

// ══════════════════════════════════════════════
// 计算结果
// ══════════════════════════════════════════════
function calc(){
  document.getElementById('computing').classList.add('active');
  setTimeout(()=>{
    const dims={EI:[],SN:[],TF:[],JP:[]};
    QS.forEach((q,i)=>dims[q.dim].push(ST.answers[i]));
    
    function cd(scores){
      const avg=scores.reduce((a,b)=>a+b,0)/scores.length;
      return {pct:Math.round((avg-1)/6*100)};
    }
    const EI=cd(dims.EI),SN=cd(dims.SN),TF=cd(dims.TF),JP=cd(dims.JP);
    const type=(EI.pct>=50?'I':'E')+(SN.pct>=50?'N':'S')+(TF.pct>=50?'F':'T')+(JP.pct>=50?'P':'J');
    
    const dimPcts={
      EI: EI.pct>=50?{label:'内向 (I)',pct:EI.pct}:{label:'外向 (E)',pct:100-EI.pct},
      SN: SN.pct>=50?{label:'直觉 (N)',pct:SN.pct}:{label:'感觉 (S)',pct:100-SN.pct},
      TF: TF.pct>=50?{label:'情感 (F)',pct:TF.pct}:{label:'思维 (T)',pct:100-TF.pct},
      JP: JP.pct>=50?{label:'感知 (P)',pct:JP.pct}:{label:'判断 (J)',pct:100-JP.pct},
    };
    
    ST.result={type,dimPcts,timestamp:Date.now()};
    saveHist(ST.result);
    document.getElementById('computing').classList.remove('active');
    renderResult(ST.result);
    showScreen('screen-result');
  },1500);
}

// ══════════════════════════════════════════════
// 渲染结果卡
// ══════════════════════════════════════════════
function renderResult(r){
  const T=TYPES[r.type]||TYPES['INFP'];
  const TH=TYPE_THEME[r.type]||TYPE_THEME['INFP'];
  
  // 背景色块
  const top=document.getElementById('rc-top');
  top.style.background=`linear-gradient(160deg,${TH.bg} 0%,${TH.bg}ee 60%,${TH.bg}cc 100%)`;
  
  // 背景装饰圆
  document.getElementById('rc-bg-deco').innerHTML=`
    <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <circle cx="20%" cy="20%" r="80" fill="${TH.accent}" opacity=".15"/>
      <circle cx="80%" cy="70%" r="100" fill="${TH.light}" opacity=".08"/>
    </svg>`;
  
  // 分组标签
  const gt=document.getElementById('rc-group-tag');
  gt.textContent=TH.group;
  gt.style.background=TH.groupBg;
  gt.style.color=TH.accent;
  
  // 头像
  document.getElementById('rc-avatar').innerHTML=getAvatar(r.type,180);
  
  // 类型码颜色
  document.getElementById('rc-code').textContent=r.type;
  document.getElementById('rc-code').style.color=TH.accent;
  
  document.getElementById('rc-name').textContent=T.name;
  
  const dessert=document.getElementById('rc-dessert');
  dessert.textContent='🍰 '+T.dessert;
  dessert.style.background=TH.groupBg;
  dessert.style.color=TH.accent;
  
  document.getElementById('rc-slogan').textContent=T.slogan;
  
  // 关键词tags
  document.getElementById('rc-tags').innerHTML=T.tags.map(t=>`
    <span class="rc-tag" style="background:${TH.groupBg};color:${TH.accent}">${t}</span>
  `).join('');
  
  // 维度条
  const dimColors=[TH.accent,'#7bc6e6','#f4a7c3','#fac858'];
  document.getElementById('dim-rows').innerHTML=Object.entries(r.dimPcts).map(([k,v],i)=>`
    <div class="dim-row">
      <span class="dim-lbl">${v.label}</span>
      <div class="dim-track"><div class="dim-fill" style="width:${v.pct}%;background:${dimColors[i]}"></div></div>
      <span class="dim-pct" style="color:${dimColors[i]}">${v.pct}%</span>
    </div>
  `).join('');
}

// ══════════════════════════════════════════════
// 历史记录
// ══════════════════════════════════════════════
function saveHist(r){
  let h=getHist();h.unshift(r);if(h.length>20)h=h.slice(0,20);
  localStorage.setItem('creammbti_v2',JSON.stringify(h));
}
function getHist(){try{return JSON.parse(localStorage.getItem('creammbti_v2')||'[]');}catch{return[];}}

function showHistory(){
  const h=getHist();
  const list=document.getElementById('hist-list');
  if(!h.length){
    list.innerHTML='<div class="hist-empty">还没有记录，快去测一次吧 🍰</div>';
  }else{
    list.innerHTML=h.map((r,i)=>{
      const T=TYPES[r.type]||TYPES['INFP'];
      const TH=TYPE_THEME[r.type]||TYPE_THEME['INFP'];
      const d=new Date(r.timestamp);
      const ds=`${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
      return`<div class="hist-item" onclick="viewHist(${i})">
        <div class="hist-avatar-sm">${getAvatar(r.type,44)}</div>
        <div class="hist-info">
          <div class="hist-type" style="color:${TH.accent}">${r.type}</div>
          <div class="hist-name">${T.name} · ${T.dessert}</div>
          <div class="hist-date">${ds}</div>
        </div>
        <span style="color:#9ca3af;font-size:18px">›</span>
      </div>`;
    }).join('');
  }
  showScreen('screen-history');
}

function viewHist(i){
  const h=getHist();ST.result=h[i];
  renderResult(h[i]);showScreen('screen-result');
}

// ══════════════════════════════════════════════
// 海报
// ══════════════════════════════════════════════
function showPoster(){
  if(!ST.result)return;
  const r=ST.result,T=TYPES[r.type]||TYPES['INFP'],TH=TYPE_THEME[r.type]||TYPE_THEME['INFP'];
  
  const src=document.getElementById('poster-src');
  src.style.background=`linear-gradient(155deg,${TH.bg} 0%,${TH.bg}dd 100%)`;
  document.getElementById('ps-avatar').innerHTML=getAvatar(r.type,140);
  document.getElementById('ps-code').textContent=r.type;
  document.getElementById('ps-code').style.color=TH.accent;
  document.getElementById('ps-name-p').textContent=T.name;
  document.getElementById('ps-name-p').style.color='#fff';
  const pd=document.getElementById('ps-dessert-p');
  pd.textContent='🍰 '+T.dessert;pd.style.background=TH.groupBg;pd.style.color=TH.accent;
  const ps=document.getElementById('ps-slogan-p');
  ps.textContent=T.slogan;ps.style.color='rgba(255,255,255,.65)';
  
  const dimColors=[TH.accent,'#7bc6e6','#f4a7c3','#fac858'];
  document.getElementById('ps-dims').innerHTML=Object.entries(r.dimPcts).map(([k,v],i)=>`
    <div class="ps-dim" style="background:rgba(255,255,255,.06)">
      <div class="ps-dim-lbl" style="color:rgba(255,255,255,.5)">${v.label}</div>
      <div class="ps-dim-val" style="color:${dimColors[i]}">${v.pct}%</div>
      <div class="ps-dim-bar"><div class="ps-dim-fill" style="width:${v.pct}%;background:${dimColors[i]}"></div></div>
    </div>
  `).join('');
  
  document.getElementById('poster-modal').classList.add('active');
  
  setTimeout(()=>{
    html2canvas(src,{scale:2,useCORS:true,backgroundColor:null,logging:false}).then(c=>{
      document.getElementById('poster-preview').src=c.toDataURL('image/png');
    }).catch(()=>toast('海报生成失败，请重试'));
  },200);
}

function closeModal(){document.getElementById('poster-modal').classList.remove('active');}
function dlPoster(){
  const img=document.getElementById('poster-preview');
  if(!img.src||img.src===location.href){toast('请稍候，海报还在生成中');return;}
  const a=document.createElement('a');
  a.download=`CreamMBTI_${ST.result.type}_${Date.now()}.png`;
  a.href=img.src;a.click();toast('✅ 海报已保存！');
}

// ══════════════════════════════════════════════
// Toast
// ══════════════════════════════════════════════
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ══════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded',()=>showScreen('screen-landing'));
document.getElementById('poster-modal').addEventListener('click',function(e){
  if(e.target===this)closeModal();
});
</script>
