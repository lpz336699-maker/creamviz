<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreamSBTI · 奶油毒舌人格测试</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root{
  --bg:#FDFBF7;
  --white:#fff;
  --t1:#0D1117;--t2:#1F2937;--tm:#4B5563;--t3:#9CA3AF;
  --accent:#b48ae0;
  --sh:0 2px 16px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);
  --sh-lg:0 12px 48px rgba(0,0,0,.13),0 3px 12px rgba(0,0,0,.07);
  --r:16px;--r-lg:24px;--r-xl:32px;
  --fd:'Nunito',sans-serif;
  --fb:'Noto Sans SC',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--fb);background:var(--bg);min-height:100vh;-webkit-font-smoothing:antialiased;color:var(--t2);}
.screen{display:none;}
.screen.active{display:block;}

/* ══ LANDING ══ */
#s-land{
  min-height:100vh;display:none;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 20px 80px;
  background:linear-gradient(155deg,#fff8e1 0%,#fdfbf7 40%,#fce4ec 100%);
  position:relative;overflow:hidden;
}
#s-land.active{display:flex;}
.ld{position:absolute;border-radius:50%;filter:blur(80px);opacity:.28;pointer-events:none;}
.ld1{width:500px;height:500px;background:#ffe082;top:-120px;left:-120px;}
.ld2{width:380px;height:380px;background:#f48fb1;top:60px;right:-80px;}
.ld3{width:300px;height:300px;background:#ce93d8;bottom:-60px;left:30%;}

.land-wrap{position:relative;z-index:1;max-width:580px;width:100%;text-align:center;}
.land-badge{
  display:inline-block;padding:5px 18px;border-radius:20px;
  background:rgba(255,193,7,.2);color:#f59e0b;
  font-family:var(--fd);font-size:13px;font-weight:900;letter-spacing:1.5px;
  margin-bottom:20px;
}
.land-title{
  font-family:var(--fd);font-size:clamp(42px,10vw,72px);font-weight:900;
  line-height:1.05;color:var(--t1);margin-bottom:14px;
}
.land-title em{
  background:linear-gradient(135deg,#f59e0b,#ec4899);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  font-style:normal;
}
.land-sub{font-size:15px;color:var(--tm);line-height:1.7;margin-bottom:10px;}
.land-warn{
  display:inline-block;padding:8px 20px;border-radius:12px;
  background:rgba(245,158,11,.1);color:#d97706;
  font-size:13px;font-weight:700;margin-bottom:32px;
}
.land-pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:36px;}
.pill{
  padding:7px 16px;border-radius:18px;font-size:12px;font-weight:700;
  background:rgba(255,255,255,.75);backdrop-filter:blur(8px);
  box-shadow:0 1px 6px rgba(0,0,0,.07);color:var(--tm);
}
.btn-go{
  display:inline-flex;align-items:center;gap:10px;
  padding:17px 52px;
  background:linear-gradient(135deg,#f59e0b 0%,#ec4899 100%);
  color:#fff;border:none;border-radius:var(--r-xl);
  font-family:var(--fb);font-size:17px;font-weight:900;cursor:pointer;
  box-shadow:0 6px 24px rgba(245,158,11,.4);transition:.25s;
}
.btn-go:hover{transform:translateY(-3px);box-shadow:0 10px 32px rgba(245,158,11,.5);}
.hist-lnk{
  display:block;margin:16px auto 0;background:none;
  border:2px solid rgba(245,158,11,.3);color:#f59e0b;
  padding:9px 28px;border-radius:20px;font-weight:700;font-size:13px;
  cursor:pointer;transition:.2s;
}
.hist-lnk:hover{background:rgba(245,158,11,.08);}

/* ══ QUIZ ══ */
#s-quiz{
  min-height:100vh;padding:36px 20px 80px;
  background:linear-gradient(155deg,#fff8e1 0%,#fdfbf7 50%,#fce4ec 100%);
}
.qwrap{max-width:660px;margin:0 auto;}
.qhd{text-align:center;margin-bottom:24px;}
.qhd h2{font-family:var(--fd);font-size:20px;font-weight:900;color:var(--t1);}
.qhd p{font-size:13px;color:var(--t3);margin-top:4px;}
.pbar{background:#ede8e0;border-radius:6px;height:6px;margin-bottom:5px;overflow:hidden;}
.pfill{height:100%;border-radius:6px;background:linear-gradient(90deg,#f59e0b,#ec4899);transition:.4s;}
.ptxt{font-size:11px;color:var(--t3);text-align:right;margin-bottom:20px;}

.qcard{
  background:#fff;border-radius:var(--r-lg);padding:32px 28px;
  box-shadow:var(--sh);animation:fadeup .28s ease;
}
@keyframes fadeup{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.qnum{font-size:11px;font-weight:800;color:#f59e0b;letter-spacing:1px;margin-bottom:12px;}
.qtxt{font-size:16px;font-weight:700;color:var(--t1);line-height:1.65;margin-bottom:24px;}

/* 7级量表 */
.scale-wrap{margin-bottom:4px;}
.scale-tips{
  display:grid;grid-template-columns:repeat(7,1fr);gap:4px;
  margin-bottom:8px;
}
.stip{
  text-align:center;font-size:9.5px;color:var(--t3);font-weight:600;
  line-height:1.3;padding:0 2px;
}
.stip.end{color:var(--tm);font-weight:700;}
.scale-btns{display:flex;gap:6px;justify-content:center;}
.sb{
  flex:1;max-width:52px;aspect-ratio:1;border:2px solid #e8e2d8;
  background:transparent;border-radius:50%;cursor:pointer;transition:.16s;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fd);font-weight:800;font-size:14px;color:#ccc;
}
.sb:hover{border-color:#f59e0b;color:#f59e0b;transform:scale(1.1);}
.sb.sel{
  background:linear-gradient(135deg,#f59e0b,#ec4899);
  border-color:transparent;color:#fff;
  box-shadow:0 2px 12px rgba(245,158,11,.4);transform:scale(1.12);
}
.scale-ends{
  display:flex;justify-content:space-between;margin-top:10px;
}
.send{font-size:11px;color:var(--tm);font-weight:600;max-width:46%;line-height:1.3;}
.send:last-child{text-align:right;}

.qnav{display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.bprev,.bnext{
  padding:11px 24px;border-radius:var(--r);border:none;
  font-family:var(--fb);font-size:14px;font-weight:700;cursor:pointer;transition:.2s;
}
.bprev{background:#fff;box-shadow:0 1px 6px rgba(0,0,0,.08);color:var(--tm);}
.bprev:hover{box-shadow:var(--sh);}
.bnext{
  background:linear-gradient(135deg,#f59e0b,#ec4899);color:#fff;
  box-shadow:0 3px 14px rgba(245,158,11,.35);
}
.bnext:hover{transform:translateY(-1px);box-shadow:0 5px 20px rgba(245,158,11,.48);}
.bnext:disabled{opacity:.4;cursor:not-allowed;transform:none;}

/* ══ RESULT ══ */
#s-result{
  min-height:100vh;padding:36px 20px 80px;
  background:linear-gradient(155deg,#fff8e1 0%,#fdfbf7 40%,#fce4ec 100%);
  display:none;align-items:flex-start;justify-content:center;
}
#s-result.active{display:flex;}
.rcard{
  width:100%;max-width:440px;
  background:#fff;border-radius:var(--r-xl);
  box-shadow:var(--sh-lg);overflow:hidden;
  animation:fadeup .4s ease;
}

/* 卡片顶部 */
.rtop{
  position:relative;padding:32px 28px 0;
  min-height:280px;
  display:flex;flex-direction:column;align-items:center;
  overflow:hidden;
}
.rtop-bg{position:absolute;inset:0;z-index:0;}
.rtag{
  position:relative;z-index:2;
  display:inline-block;padding:4px 14px;border-radius:12px;
  font-size:10px;font-weight:900;letter-spacing:1.5px;
  text-transform:uppercase;margin-bottom:14px;
}
.ravatar{
  position:relative;z-index:2;width:200px;height:200px;flex-shrink:0;
}
.ravatar svg{width:100%;height:100%;}

/* 卡片底部 */
.rbot{padding:24px 28px 28px;}
.rcode{
  font-family:var(--fd);font-size:13px;font-weight:900;
  letter-spacing:2px;margin-bottom:4px;opacity:.5;
}
.rname{
  font-family:var(--fd);font-size:32px;font-weight:900;
  color:var(--t1);line-height:1.1;margin-bottom:8px;
}
.rdesc{
  font-size:13px;color:var(--tm);line-height:1.75;
  margin-bottom:20px;
}
.rtags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px;}
.rtag-item{
  padding:5px 12px;border-radius:10px;
  font-size:11px;font-weight:700;
}
.ract{display:flex;gap:8px;}
.abtn{
  flex:1;padding:12px 0;border-radius:var(--r);border:none;
  font-family:var(--fb);font-size:13px;font-weight:700;cursor:pointer;transition:.2s;
}
.apri{
  background:linear-gradient(135deg,#f59e0b,#ec4899);color:#fff;
  box-shadow:0 3px 12px rgba(245,158,11,.35);
}
.apri:hover{transform:translateY(-1px);}
.asec{background:#f9f5ee;color:var(--tm);}
.asec:hover{background:#f0e8d8;}

/* ══ HISTORY ══ */
#s-hist{min-height:100vh;padding:36px 20px 80px;background:var(--bg);}
.hwrap{max-width:500px;margin:0 auto;}
.hhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;}
.hhd h2{font-family:var(--fd);font-size:22px;font-weight:900;color:var(--t1);}
.hitem{
  background:#fff;border-radius:var(--r);padding:16px 18px;
  box-shadow:0 1px 6px rgba(0,0,0,.06);margin-bottom:10px;
  display:flex;align-items:center;gap:12px;cursor:pointer;transition:.2s;
}
.hitem:hover{box-shadow:var(--sh);transform:translateX(3px);}
.hava{width:48px;height:48px;flex-shrink:0;}
.hava svg{width:100%;height:100%;}
.hinfo{flex:1;}
.hname{font-family:var(--fd);font-size:16px;font-weight:900;}
.hsub{font-size:11px;color:var(--t3);margin-top:3px;}
.hempty{text-align:center;padding:60px 20px;color:var(--t3);font-size:14px;}

/* ══ POSTER MODAL ══ */
.mov{
  position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;
}
.mov.active{display:flex;}
.mbox{
  background:#fff;border-radius:var(--r-xl);padding:26px;
  max-width:380px;width:100%;box-shadow:var(--sh-lg);text-align:center;
}
.mtit{font-family:var(--fd);font-size:16px;font-weight:900;color:var(--t1);margin-bottom:14px;}
#pimg{width:100%;border-radius:var(--r);box-shadow:0 2px 12px rgba(0,0,0,.1);margin-bottom:14px;}
.mbtns{display:flex;gap:10px;justify-content:center;}

/* ══ POSTER SRC ══ */
#psrc{
  position:fixed;left:-9999px;top:-9999px;width:400px;
  padding:32px 26px 24px;font-family:'Noto Sans SC',sans-serif;
}
.pst{display:flex;flex-direction:column;align-items:center;text-align:center;}
.plogo{font-family:'Nunito',sans-serif;font-size:10px;font-weight:900;letter-spacing:2px;opacity:.5;margin-bottom:12px;}
.pava{width:150px;height:150px;}
.pava svg{width:100%;height:100%;}
.pcode{font-family:'Nunito',sans-serif;font-size:11px;font-weight:900;letter-spacing:2px;margin:12px 0 4px;opacity:.5;}
.pname{font-family:'Nunito',sans-serif;font-size:28px;font-weight:900;line-height:1.1;margin-bottom:8px;}
.pdesc{font-size:12px;color:#6b7280;line-height:1.6;margin-bottom:16px;}
.ptags{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:16px;}
.ptag-i{padding:4px 10px;border-radius:8px;font-size:10px;font-weight:700;}
.pbrand{font-size:10px;color:#9ca3af;margin-top:6px;}

/* ══ MISC ══ */
.computing{
  position:fixed;inset:0;background:rgba(253,251,247,.96);
  z-index:900;display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;
}
.computing.active{display:flex;}
.cico{font-size:44px;animation:bounce 1s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.ctxt{font-size:15px;font-weight:700;color:var(--tm);}
.toast{
  position:fixed;bottom:68px;left:50%;transform:translateX(-50%) translateY(16px);
  background:#111827;color:#fff;padding:10px 22px;border-radius:18px;
  font-size:13px;font-weight:600;opacity:0;transition:.28s;z-index:2000;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.brand{
  position:fixed;bottom:14px;right:18px;
  font-size:10px;font-weight:700;color:var(--t3);letter-spacing:.5px;
  pointer-events:none;z-index:500;font-family:var(--fd);
}
</style>
</head>
<body>

<!-- LANDING -->
<div id="s-land" class="screen">
  <div class="ld ld1"></div><div class="ld ld2"></div><div class="ld ld3"></div>
  <div class="land-wrap">
    <div class="land-badge">🍮 CreamSBTI</div>
    <h1 class="land-title">你<em>到底</em><br>是什么人？</h1>
    <p class="land-sub">不是那种让你感觉良好的测试。<br>是那种让你对着结果沉默三秒的测试。</p>
    <div class="land-warn">⚠️ 结果毒舌但真诚，请做好心理准备</div>
    <div class="land-pills">
      <span class="pill">🎯 24道场景题</span>
      <span class="pill">🃏 18种人格类型</span>
      <span class="pill">😶 戳心指数 ★★★★★</span>
      <span class="pill">📸 可生成分享海报</span>
    </div>
    <button class="btn-go" onclick="startQ()">接受审判 →</button>
    <button class="hist-lnk" onclick="showHist()">📋 历史记录</button>
  </div>
</div>

<!-- QUIZ -->
<div id="s-quiz" class="screen">
  <div class="qwrap">
    <div class="qhd">
      <h2>🍮 CreamSBTI</h2>
      <p>不要想太多，第一反应最准</p>
    </div>
    <div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
    <div class="ptxt" id="ptxt">0 / 24</div>
    <div id="qbox"></div>
    <div class="qnav">
      <button class="bprev" id="bprev" onclick="prevQ()">← 上一题</button>
      <button class="bnext" id="bnext" onclick="nextQ()">下一题 →</button>
    </div>
  </div>
</div>

<!-- RESULT -->
<div id="s-result" class="screen">
  <div class="rcard" id="rcard">
    <div class="rtop" id="rtop">
      <div class="rtop-bg" id="rtop-bg"></div>
      <div class="rtag" id="rtag-top"></div>
      <div class="ravatar" id="ravatar"></div>
    </div>
    <div class="rbot">
      <div class="rcode" id="rcode"></div>
      <div class="rname" id="rname"></div>
      <div class="rdesc" id="rdesc"></div>
      <div class="rtags" id="rtags"></div>
      <div class="ract">
        <button class="abtn apri" onclick="showPoster()">📸 生成海报</button>
        <button class="abtn asec" onclick="startQ()">🔄 重测</button>
        <button class="abtn asec" onclick="showHist()">📋 历史</button>
      </div>
    </div>
  </div>
</div>

<!-- HISTORY -->
<div id="s-hist" class="screen">
  <div class="hwrap">
    <div class="hhd">
      <h2>📋 历史记录</h2>
      <button class="abtn asec" style="padding:8px 16px;font-size:12px;flex:unset;" onclick="showScr('s-land')">← 返回</button>
    </div>
    <div id="hlist"></div>
  </div>
</div>

<!-- POSTER MODAL -->
<div class="mov" id="pmodal">
  <div class="mbox">
    <div class="mtit">📸 分享海报</div>
    <img id="pimg" alt="海报">
    <div class="mbtns">
      <button class="abtn apri" style="padding:11px 22px;flex:unset;" onclick="dlPoster()">💾 保存</button>
      <button class="abtn asec" style="padding:11px 22px;flex:unset;" onclick="closeM()">关闭</button>
    </div>
  </div>
</div>

<!-- POSTER SRC -->
<div id="psrc">
  <div class="pst">
    <div class="plogo">CreamSBTI · 奶油毒舌人格测试</div>
    <div class="pava" id="pava"></div>
    <div class="pcode" id="p-code"></div>
    <div class="pname" id="p-name"></div>
    <div class="pdesc" id="p-desc"></div>
    <div class="ptags" id="p-tags"></div>
    <div class="pbrand">© CreamViz by Alin</div>
  </div>
</div>

<div class="computing" id="comp"><div class="cico">🔮</div><div class="ctxt">正在鉴定你的人格……</div></div>
<div class="toast" id="toast"></div>
<div class="brand">© CreamViz by Alin</div>

<script>
// ══════════════════════════════════════════════
// 24道题目 + 维度权重
// 每题有 weights 对象，答1-7分别偏向不同类型
// 用累加分数决定最终类型
// ══════════════════════════════════════════════
const QS = [
  {
    id:1,
    text:'你订了下午两点的会议，但对方迟到了二十分钟。你会：',
    left:'算了，等着就等着吧',
    right:'已经在心里开除他了',
    tips:['完全能接受','基本没事','有点不爽','内外交困','明显烦躁','很不开心','绝对不行'],
    weights:{
      '佛系打工人':[3,2,1,0,0,0,0],
      '隐形完美主义者':[0,0,1,2,3,2,1],
      '情绪CEO':[0,0,0,1,2,3,3],
    }
  },
  {
    id:2,
    text:'朋友发来一张长图问你"有没有认识招人的"。你的内心戏：',
    left:'帮人帮到底，我来想想',
    right:'这种事能直接问吗……',
    tips:['当然帮','大概能帮','试试看','有点难','有点不爽','很为难','请别问我'],
    weights:{
      '社交工具人':[3,2,1,0,0,0,0],
      '边界感大师':[0,0,0,1,2,3,3],
      '高冷观察者':[0,0,1,2,2,1,0],
    }
  },
  {
    id:3,
    text:'你独处了一个周末，手机几乎没响。你的感受是：',
    left:'太好了，终于安静了',
    right:'有点空，感觉被世界遗忘了',
    tips:['大享受','挺好的','还行','有点空','空空的','挺失落','不能忍'],
    weights:{
      '高级独处者':[3,2,1,0,0,0,0],
      '隐性社牛':[0,0,1,2,3,3,2],
      '情绪CEO':[0,0,0,0,1,2,3],
    }
  },
  {
    id:4,
    text:'你接手了一个"前任留下的烂摊子"。你的第一反应：',
    left:'好，挑战来了，我来整理',
    right:'谁弄的谁负责，关我什么事',
    tips:['立刻上手','大概会管','勉强可以','有点抵触','明显不想','拒绝接受','直接甩锅'],
    weights:{
      '默默扛事的人':[3,2,1,0,0,0,0],
      '边界感大师':[0,0,1,2,3,3,2],
      '高级废人':[0,0,0,1,2,3,3],
    }
  },
  {
    id:5,
    text:'你在一个派对上，认识的人只有带你来的那一个。你会：',
    left:'自己找人搭讪，认识几个新朋友',
    right:'跟着那一个人寸步不离',
    tips:['主动出击','试着认识人','看情况','基本待着','跟紧朋友','极度依赖','不如回家'],
    weights:{
      '隐性社牛':[3,2,1,0,0,0,0],
      '高冷观察者':[0,1,2,2,1,0,0],
      '社交焦虑研究生':[0,0,0,1,2,3,3],
    }
  },
  {
    id:6,
    text:'你正在认真做一件事，有人突然来找你说"能帮我看一下这个吗"。你：',
    left:'先停下来，帮完再继续',
    right:'我现在有点忙……',
    tips:['马上帮','帮一下','稍微帮','有点犹豫','请等一下','真的不行','请走开'],
    weights:{
      '社交工具人':[3,2,1,0,0,0,0],
      '隐形完美主义者':[0,0,1,2,3,2,1],
      '边界感大师':[0,0,0,1,2,3,3],

    // 基于答案整体趋势补分
    if(v<=2){ // 极左
      scores['默默扛事的人']=(scores['默默扛事的人']||0)+0.5;
      scores['社交工具人']=(scores['社交工具人']||0)+0.3;
    }
    if(v>=6){ // 极右
      scores['高级废人']=(scores['高级废人']||0)+0.5;
      scores['边界感大师']=(scores['边界感大师']||0)+0.3;
    }
    if(v===4){ // 中间
      scores['过度思考型选手']=(scores['过度思考型选手']||0)+0.4;
      scores['间歇性自律者']=(scores['间歇性自律者']||0)+0.2;
    }
  });
  
  // 取最高分
  let best=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  return best[0][0];
}

  const base = avs[type] || avs['高级废人'];
  if(size !== 200){
    return base.replace('viewBox="0 0 200 220"', `viewBox="0 0 200 220" width="${size}" height="${size}"`);
  }
  return base;
}

// ══════════════════════════════════════════════
// 状态
// ══════════════════════════════════════════════
let ST = {ans: new Array(24).fill(null), cur: 0, result: null};

// ══════════════════════════════════════════════
// 屏幕切换
// ══════════════════════════════════════════════
function showScr(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

// ══════════════════════════════════════════════
// 答题
// ══════════════════════════════════════════════
function startQ(){
  ST = {ans: new Array(24).fill(null), cur: 0, result: null};
  showScr('s-quiz');
  renderQ(0);
}

function renderQ(idx){
  const q = QS[idx];
  document.getElementById('qbox').innerHTML = `
    <div class="qcard">
      <div class="qnum">Q${idx+1} / 24</div>
      <div class="qtxt">${q.text}</div>
      <div class="scale-wrap">
        <div class="scale-tips">
          ${q.tips.map((t,i)=>`<div class="stip${i===0||i===6?' end':''}">${t}</div>`).join('')}
        </div>
        <div class="scale-btns">
          ${[1,2,3,4,5,6,7].map(v=>`
            <button class="sb${ST.ans[idx]===v?' sel':''}" onclick="pick(${idx},${v})">${v}</button>
          `).join('')}
        </div>
        <div class="scale-ends">
          <span class="send">← ${q.left}</span>
          <span class="send">${q.right} →</span>
        </div>
      </div>
    </div>`;
  
  const done = ST.ans.filter(a=>a!==null).length;
  document.getElementById('pfill').style.width = (done/24*100)+'%';
  document.getElementById('ptxt').textContent = `${done} / 24`;
  document.getElementById('bprev').style.visibility = idx===0?'hidden':'visible';
  const bn = document.getElementById('bnext');
  bn.textContent = idx===23 ? '揭晓结果 🎉' : '下一题 →';
  bn.disabled = ST.ans[idx]===null;
}

function pick(idx, v){ ST.ans[idx]=v; renderQ(idx); }
function nextQ(){
  if(ST.ans[ST.cur]===null) return;
  if(ST.cur===23){ calc(); return; }
  ST.cur++; renderQ(ST.cur);
}
function prevQ(){ if(ST.cur===0) return; ST.cur--; renderQ(ST.cur); }

// ══════════════════════════════════════════════
// 计算
// ══════════════════════════════════════════════
function calc(){
  document.getElementById('comp').classList.add('active');
  setTimeout(()=>{
    const type = calcType(ST.ans);
    ST.result = {type, timestamp: Date.now()};
    saveHist(ST.result);
    document.getElementById('comp').classList.remove('active');
    renderResult(ST.result);
    showScr('s-result');
  }, 1600);
}

// ══════════════════════════════════════════════
// 渲染结果
// ══════════════════════════════════════════════
function renderResult(r){
  const T = TYPES[r.type] || TYPES['高级废人'];
  
  // 顶部背景
  const top = document.getElementById('rtop');
  top.style.background = `linear-gradient(160deg,${T.bg} 0%,${T.light} 100%)`;
  document.getElementById('rtop-bg').innerHTML = `
    <svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
      <circle cx="15%" cy="15%" r="80" fill="${T.color}" opacity=".08"/>
      <circle cx="85%" cy="75%" r="100" fill="${T.color}" opacity=".06"/>
    </svg>`;
  
  // 标签
  const tag = document.getElementById('rtag-top');
  tag.textContent = T.emoji + ' ' + r.type;
  tag.style.background = `${T.color}20`;
  tag.style.color = T.accent;
  
  // 头像
  document.getElementById('ravatar').innerHTML = getAvatar(r.type, 200);
  
  // 底部信息
  const code = document.getElementById('rcode');
  code.textContent = T.code;
  code.style.color = T.color;
  
  document.getElementById('rname').textContent = r.type;
  document.getElementById('rdesc').textContent = T.desc;
  
  document.getElementById('rtags').innerHTML = T.tags.map(t=>`
    <span class="rtag-item" style="background:${T.color}18;color:${T.accent}">${t}</span>
  `).join('');
}

// ══════════════════════════════════════════════
// 历史
// ══════════════════════════════════════════════
function saveHist(r){
  let h = getHist(); h.unshift(r);
  if(h.length>20) h=h.slice(0,20);
  localStorage.setItem('creamsbti_v1', JSON.stringify(h));
}
function getHist(){
  try{ return JSON.parse(localStorage.getItem('creamsbti_v1')||'[]'); }catch{ return []; }
}
function showHist(){
  const h = getHist();
  const list = document.getElementById('hlist');
  if(!h.length){
    list.innerHTML='<div class="hempty">还没有记录，去接受审判吧 🍮</div>';
  }else{
    list.innerHTML = h.map((r,i)=>{
      const T = TYPES[r.type]||TYPES['高级废人'];
      const d = new Date(r.timestamp);
      const ds = `${d.getFullYear()}-${(d.getMonth()+1).toString().padStart(2,'0')}-${d.getDate().toString().padStart(2,'0')}`;
      return`<div class="hitem" onclick="viewHist(${i})">
        <div class="hava">${getAvatar(r.type,48)}</div>
        <div class="hinfo">
          <div class="hname" style="color:${T.color}">${T.emoji} ${r.type}</div>
          <div class="hsub">${T.tags[0]} · ${ds}</div>
        </div>
        <span style="color:#9ca3af;font-size:18px">›</span>
      </div>`;
    }).join('');
  }
  showScr('s-hist');
}
function viewHist(i){
  const h=getHist(); ST.result=h[i];
  renderResult(h[i]); showScr('s-result');
}

// ══════════════════════════════════════════════
// 海报
// ══════════════════════════════════════════════
function showPoster(){
  if(!ST.result) return;
  const r=ST.result, T=TYPES[r.type]||TYPES['高级废人'];
  const src=document.getElementById('psrc');
  src.style.background=`linear-gradient(160deg,${T.bg} 0%,${T.light} 100%)`;
  document.getElementById('pava').innerHTML=getAvatar(r.type,150);
  document.getElementById('p-code').textContent=T.code;
  document.getElementById('p-code').style.color=T.color;
  document.getElementById('p-name').textContent=T.emoji+' '+r.type;
  document.getElementById('p-name').style.color=T.accent;
  document.getElementById('p-desc').textContent=T.desc;
  document.getElementById('p-tags').innerHTML=T.tags.map(t=>`
    <span class="ptag-i" style="background:${T.color}20;color:${T.accent}">${t}</span>
  `).join('');
  document.getElementById('pmodal').classList.add('active');
  setTimeout(()=>{
    html2canvas(src,{scale:2,useCORS:true,backgroundColor:null,logging:false}).then(c=>{
      document.getElementById('pimg').src=c.toDataURL('image/png');
    }).catch(()=>toast('生成失败，请重试'));
  },200);
}
function closeM(){ document.getElementById('pmodal').classList.remove('active'); }
function dlPoster(){
  const img=document.getElementById('pimg');
  if(!img.src||img.src===location.href){toast('请稍候');return;}
  const a=document.createElement('a');
  a.download=`CreamSBTI_${ST.result.type}_${Date.now()}.png`;
  a.href=img.src; a.click(); toast('✅ 已保存！');
}

function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

window.addEventListener('DOMContentLoaded',()=>showScr('s-land'));
document.getElementById('pmodal').addEventListener('click',function(e){if(e.target===this)closeM();});
</script>
</body>
</html>
