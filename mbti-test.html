<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBTI 职业性格测试</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans SC', sans-serif;
      background: #FDF8F3;
      color: #3D3D3D;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #C8954A, #D4A85C);
      padding: 40px 20px;
      text-align: center;
      color: #fff;
    }
    .header h1 { font-size: 28px; margin-bottom: 8px; }
    .header p { font-size: 14px; opacity: 0.9; }
    .container { max-width: 700px; margin: 0 auto; padding: 30px 20px; }
    .progress-bar {
      background: #E8E0D5;
      height: 8px;
      border-radius: 4px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .progress-fill {
      background: linear-gradient(90deg, #C8954A, #D4A85C);
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s;
    }
    .progress-text { text-align: center; font-size: 13px; color: #888; margin-bottom: 20px; }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    .question-num { font-size: 12px; color: #C8954A; font-weight: 500; margin-bottom: 10px; }
    .question-text { font-size: 18px; font-weight: 500; margin-bottom: 25px; line-height: 1.5; }
    .option {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      border: 2px solid #E8E0D5;
      border-radius: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .option:hover { border-color: #D4A85C; background: #FDF9F3; }
    .option.selected { border-color: #C8954A; background: #FDF4E7; }
    .option-radio {
      width: 20px; height: 20px;
      border: 2px solid #E8E0D5;
      border-radius: 50%;
      margin-right: 15px;
      display: flex; align-items: center; justify-content: center;
    }
    .option.selected .option-radio { border-color: #C8954A; background: #C8954A; }
    .option.selected .option-radio::after {
      content: ''; width: 8px; height: 8px; background: #fff; border-radius: 50%;
    }
    .btn-group { display: flex; gap: 12px; margin-top: 25px; }
    .btn {
      flex: 1; padding: 14px 24px; border-radius: 12px;
      font-size: 15px; font-weight: 500; cursor: pointer;
      border: none; font-family: inherit; transition: all 0.2s;
    }
    .btn-primary { background: linear-gradient(135deg, #C8954A, #D4A85C); color: #fff; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(200,149,74,0.3); }
    .btn-secondary { background: #fff; border: 2px solid #E8E0D5; color: #3D3D3D; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .result { display: none; }
    .result-type {
      font-size: 64px; font-weight: 700;
      background: linear-gradient(135deg, #C8954A, #A67B3D);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }
    .result-title { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
    .result-subtitle { font-size: 14px; color: #888; margin-bottom: 30px; }
    .result-img {
      width: 200px; height: 200px; margin: 0 auto 30px;
      border-radius: 20px; object-fit: cover;
      box-shadow: 0 10px 40px rgba(200,149,74,0.2);
    }
    .result-desc { font-size: 15px; line-height: 1.8; text-align: left; margin-bottom: 20px; }
    .traits { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 25px; }
    .trait {
      background: #FDF4E7; color: #C8954A;
      padding: 6px 14px; border-radius: 20px;
      font-size: 13px; font-weight: 500;
    }
    .careers { background: #F9F9F9; border-radius: 12px; padding: 20px; text-align: left; }
    .careers h3 { font-size: 14px; color: #888; margin-bottom: 10px; }
    .careers p { font-size: 14px; line-height: 1.6; }
    .restart-btn {
      margin-top: 25px; padding: 14px 40px;
      background: linear-gradient(135deg, #C8954A, #D4A85C);
      color: #fff; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 500; cursor: pointer;
    }
  </style>
</head>
<body>

    <p>20道题，发现真实的自己</p>

    <!-- 测试页面 -->

      <div class="card">
        <div class="question-num">QUESTION <span id="q-num">01</span></div>
        <div class="question-text" id="q-text">加载中...</div>
        <div id="options"></div>
        
        <div class="btn-group">
          <button class="btn btn-secondary" id="prev-btn" onclick="prevQuestion()" disabled>上一题</button>
          <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" disabled>下一题</button>
        </div>
      </div>
    </div>

    <!-- 结果页面 -->
    <div id="result-page" class="result">
      <div class="card">
        <div class="result-type" id="result-type">INTJ</div>

        <div class="traits" id="traits"></div>
        
        <div class="careers">
          <h3>适合的职业方向</h3>
          <p id="careers"></p>
        </div>
        
        <button class="restart-btn" onclick="restart()">重新测试</button>
      </div>
    </div>
  </div>

    let currentQ = 0;
    let answers = [];

    function renderQuestion() {
      const q = questions[currentQ];
      document.getElementById('q-num').textContent = String(currentQ + 1).padStart(2, '0');
      document.getElementById('q-text').textContent = q.text;
      document.getElementById('current').textContent = currentQ + 1;
      document.getElementById('progress').style.width = ((currentQ + 1) / 20 * 100) + '%';
      
      const optionsDiv = document.getElementById('options');
      optionsDiv.innerHTML = q.options.map((opt, i) => `
        <div class="option ${answers[currentQ] === i ? 'selected' : ''}" onclick="selectOption(${i})">
          <div class="option-radio"></div>
          <div class="option-text">${opt}</div>
        </div>
      `).join('');
      
      document.getElementById('prev-btn').disabled = currentQ === 0;
      document.getElementById('next-btn').textContent = currentQ === 19 ? '查看结果' : '下一题';
      document.getElementById('next-btn').disabled = answers[currentQ] === undefined;
    }

    function selectOption(idx) {
      answers[currentQ] = idx;
      renderQuestion();
    }

    function nextQuestion() {
      if (currentQ < 19) {
        currentQ++;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function prevQuestion() {
      if (currentQ > 0) {
        currentQ--;
        renderQuestion();
      }
    }

    function showResult() {
      // 计算分数
      let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
      
      questions.forEach((q, i) => {
        const type = q.type;
        const ans = answers[i];
        if (type === 'EI') scores[ans === 0 ? 'E' : 'I']++;
        if (type === 'SN') scores[ans === 0 ? 'S' : 'N']++;
        if (type === 'TF') scores[ans === 0 ? 'T' : 'F']++;
        if (type === 'JP') scores[ans === 0 ? 'J' : 'P']++;
      });
      
      // 确定类型
      const type = 
        (scores.E > scores.I ? 'E' : 'I') +
        (scores.S > scores.N ? 'S' : 'N') +
        (scores.T > scores.F ? 'T' : 'F') +
        (scores.J > scores.P ? 'J' : 'P');
      
      const p = personalities[type];
      
      document.getElementById('result-type').textContent = type;
      document.getElementById('result-title').textContent = p.title;
      document.getElementById('result-subtitle').textContent = p.subtitle;
      document.getElementById('result-img').src = p.img;
      document.getElementById('result-desc').textContent = p.desc;
      document.getElementById('careers').textContent = p.careers;
      
      const traitsDiv = document.getElementById('traits');
      traitsDiv.innerHTML = p.traits.map(t => `<span class="trait">${t}</span>`).join('');
      
      document.getElementById('quiz-page').style.display = 'none';
      document.getElementById('result-page').style.display = 'block';
      document.querySelector('.progress-bar').style.display = 'none';
      document.querySelector('.progress-text').style.display = 'none';
    }

    function restart() {
      currentQ = 0;
      answers = [];
      document.getElementById('quiz-page').style.display = 'block';
      document.getElementById('result-page').style.display = 'none';
      document.querySelector('.progress-bar').style.display = 'block';
      document.querySelector('.progress-text').style.display = 'block';
      renderQuestion();
    }

    // 初始化
    renderQuestion();
  </script>
</body>
</html>
