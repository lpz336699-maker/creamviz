<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreamViz 产品中台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FDFBF7;--bg2:#F5F0E8;--bg3:#EDE8DF;
  --gold:#C8A96E;--gold2:#E8C87A;--gold3:#F5EDD6;
  --dark:#1A1A2E;--mid:#2D4A7A;--blue:#3A7FCA;
  --text:#2C2C3E;--text2:#5A5A6E;--text3:#8A8A9E;
  --border:#E8DFC8;--border2:#D5C9B0;
  --red:#C0392B;--redbg:#FFF0EF;
  --shadow:0 2px 12px rgba(26,26,46,.08);
  --shadow2:0 4px 24px rgba(26,26,46,.12);
}
body{background:var(--bg);font-family:'Noto Sans SC',system-ui,sans-serif;color:var(--text);min-height:100vh}

/* 顶部导航 */
.nav{background:var(--dark);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.nav-logo{display:flex;align-items:center;gap:10px}
.nav-logo-mark{width:28px;height:28px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:var(--dark)}
.nav-logo-text{font-size:15px;font-weight:700;color:#fff}
.nav-logo-text span{color:var(--gold2);font-size:12px;font-weight:400;margin-left:6px;opacity:.8}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-btn{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s}
.nav-btn:hover{background:rgba(255,255,255,.18)}
.nav-btn.primary{background:var(--gold);color:var(--dark);border-color:var(--gold);font-weight:700}
.nav-btn.primary:hover{background:var(--gold2)}
.nav-tag{font-size:11px;color:var(--text3);background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:2px 8px}

.view{display:none}
.view.active{display:block}

/* 管理后台布局 */
.admin-layout{display:grid;grid-template-columns:260px 1fr;gap:0;min-height:calc(100vh - 56px)}

/* 侧边栏 */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:24px 16px;display:flex;flex-direction:column;gap:6px}
.sidebar-section{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding:8px 12px 4px;margin-top:8px}
.sidebar-section:first-child{margin-top:0}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .2s;border:1px solid transparent}
.sidebar-item:hover{background:var(--bg3);color:var(--text)}
.sidebar-item.active{background:var(--dark);color:#fff;font-weight:500}
.sidebar-item .icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sidebar-item .count{margin-left:auto;background:var(--gold3);color:var(--dark);border-radius:10px;padding:1px 7px;font-size:11px;font-weight:700}
.sidebar-item.active .count{background:rgba(255,255,255,.2);color:#fff}

/* 主内容区 */
.main{padding:28px 32px;overflow-y:auto}
.main-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.main-title{font-size:20px;font-weight:700;color:var(--dark)}
.main-subtitle{font-size:13px;color:var(--text3);margin-top:4px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;transition:all .2s;border:none}
.btn-primary{background:var(--dark);color:#fff}
.btn-primary:hover{background:var(--mid)}
.btn-gold{background:var(--gold);color:var(--dark)}
.btn-gold:hover{background:var(--gold2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg2);color:var(--text)}
.btn-danger{background:var(--redbg);color:var(--red);border:1px solid #f5c5c0}
.btn-danger:hover{background:#ffe0de}
.btn-sm{padding:5px 10px;font-size:12px}

/* 产品网格 */
.product-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.product-card{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .2s;cursor:pointer}
.product-card:hover{box-shadow:var(--shadow2);border-color:var(--border2);transform:translateY(-1px)}
.card-thumb{height:120px;display:flex;align-items:center;justify-content:center;font-size:36px;position:relative}
.card-type-badge{position:absolute;top:8px;right:8px;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.type-html{background:#EBF3FD;color:#185FA5}
.type-multi{background:#F3EFFE;color:#6D28D9}
.type-tool{background:#FFF3CD;color:#854F0B}
.card-body{padding:14px}
.card-name{font-size:14px;font-weight:700;color:var(--dark);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-desc{font-size:12px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:36px}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.card-footer-left{display:flex;align-items:center;gap:6px}
.status-dot{width:6px;height:6px;border-radius:50%}
.dot-active{background:#22c55e}
.dot-draft{background:var(--text3)}
.status-text{font-size:11px;color:var(--text3)}
.card-actions{display:flex;gap:4px}
.icon-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;color:var(--text2)}
.icon-btn:hover{background:var(--bg2);border-color:var(--border2)}
.icon-btn.copy-btn:hover{background:#EBF3FD;border-color:#b5d4f4;color:#185FA5}
.icon-btn.edit-btn:hover{background:var(--gold3);border-color:var(--gold);color:var(--dark)}
.icon-btn.del-btn:hover{background:var(--redbg);border-color:#f5c5c0;color:var(--red)}
.icon-btn.open-btn:hover{background:#ECFDF5;border-color:#86efac;color:#166534}

/* 统计卡片 */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:16px;border-left:3px solid var(--gold)}
.stat-val{font-size:26px;font-weight:900;color:var(--dark)}
.stat-label{font-size:12px;color:var(--text3);margin-top:3px}

/* 搜索过滤栏 */
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--gold);background:#fff}
.filter-select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;background:var(--bg);color:var(--text);cursor:pointer;outline:none}
.filter-select:focus{border-color:var(--gold)}

/* 模态框 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(26,26,46,.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:560px;box-shadow:0 8px 48px rgba(26,26,46,.2);max-height:90vh;overflow-y:auto}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700;color:var(--dark)}
.modal-close{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:16px;color:var(--text3);display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:var(--bg2)}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.form-group{margin-bottom:16px}
.form-label{font-size:13px;font-weight:500;color:var(--text);margin-bottom:6px;display:block}
.form-label span{color:var(--red);margin-left:2px}
.form-input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);background:var(--bg);outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--gold);background:#fff}
.form-textarea{resize:vertical;min-height:80px;line-height:1.6}
.form-select{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);background:var(--bg);cursor:pointer;outline:none}
.form-select:focus{border-color:var(--gold)}
.form-hint{font-size:11px;color:var(--text3);margin-top:4px}
.emoji-picker{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.emoji-opt{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.emoji-opt:hover,.emoji-opt.selected{background:var(--gold3);border-color:var(--gold)}

/* 链接面板 */
.link-panel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:12px}
.link-panel-title{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.link-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.link-row:last-child{margin-bottom:0}
.link-label{font-size:12px;color:var(--text3);width:60px;flex-shrink:0}
.link-url{flex:1;background:#fff;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:monospace}
.link-copy-btn{padding:5px 10px;border-radius:6px;background:var(--dark);color:#fff;border:none;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap;transition:background .2s}
.link-copy-btn:hover{background:var(--mid)}
.link-copy-btn.copied{background:#22c55e}

/* 客户端预览页 */
.preview-page{min-height:100vh;background:var(--bg)}
.preview-nav{background:var(--dark);padding:0 24px;height:50px;display:flex;align-items:center;gap:12px}
.preview-nav-logo{font-size:13px;color:rgba(255,255,255,.5)}
.preview-nav-sep{color:rgba(255,255,255,.2)}
.preview-nav-name{font-size:14px;font-weight:700;color:#fff}
.preview-hero{padding:48px 32px 32px;max-width:800px;margin:0 auto}
.preview-type-chip{display:inline-flex;align-items:center;gap:6px;background:var(--gold3);color:var(--dark);border:1px solid var(--gold);border-radius:20px;padding:4px 14px;font-size:12px;font-weight:700;margin-bottom:16px}
.preview-title{font-size:32px;font-weight:900;color:var(--dark);line-height:1.2;margin-bottom:12px}
.preview-desc{font-size:15px;color:var(--text2);line-height:1.8;max-width:600px;margin-bottom:28px}
.preview-actions{display:flex;gap:12px;flex-wrap:wrap}
.preview-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;border:none;text-decoration:none}
.preview-btn-main{background:var(--dark);color:#fff}
.preview-btn-main:hover{background:var(--mid)}
.preview-btn-sub{background:var(--bg2);color:var(--text);border:1px solid var(--border)}
.preview-btn-sub:hover{background:var(--bg3)}
.preview-content{padding:0 32px 48px;max-width:800px;margin:0 auto}
.preview-section-title{font-size:16px;font-weight:700;color:var(--dark);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--gold3)}
.preview-features{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:32px}
.preview-feature-item{background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;align-items:flex-start;gap:10px}
.preview-feature-icon{font-size:20px;flex-shrink:0}
.preview-feature-text{font-size:13px;color:var(--text2);line-height:1.5}
.preview-iframe-wrap{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;height:500px;position:relative}
.preview-iframe-wrap iframe{width:100%;height:100%;border:none}
.preview-watermark{text-align:center;padding:24px;font-size:12px;color:var(--text3);border-top:1px solid var(--border);margin-top:32px}

/* Toast */
.toast{position:fixed;top:72px;right:24px;background:var(--dark);color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;transform:translateX(120%);transition:transform .3s;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow2)}
.toast.show{transform:translateX(0)}
.toast.success{background:#166534}
.toast.error{background:var(--red)}
.toast.info{background:#1d4ed8}

/* 空状态 */
#empty-state{text-align:center;padding:80px 0;color:var(--text3)}
#empty-state .big{font-size:48px;margin-bottom:12px}
#empty-state .title{font-size:16px;font-weight:500;margin-bottom:8px}
#empty-state .sub{font-size:13px}

/* 响应式 */
@media(max-width:768px){
  .admin-layout{grid-template-columns:1fr}
  .sidebar{display:none}
  .stat-row{grid-template-columns:repeat(2,1fr)}
  .product-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ═══════════════ 管理后台视图 ═══════════════ -->
<div class="view active" id="view-admin">
  <nav class="nav">
    <div class="nav-logo">
      <div class="nav-logo-mark">C</div>
      <div class="nav-logo-text">CreamViz 产品中台 <span>by Alin</span></div>
    </div>
    <div class="nav-right">
      <span class="nav-tag" id="nav-count">0 个产品</span>
      <button class="nav-btn primary" onclick="openAddModal()">＋ 添加产品</button>
    </div>
  </nav>

  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-section">产品分类</div>
      <div class="sidebar-item active" onclick="filterProducts('all',this)">
        <span class="icon">📦</span> 全部产品
        <span class="count" id="count-all">0</span>
      </div>
      <div class="sidebar-item" onclick="filterProducts('html',this)">
        <span class="icon">📊</span> 看板/报告
        <span class="count" id="count-html">0</span>
      </div>
      <div class="sidebar-item" onclick="filterProducts('tool',this)">
        <span class="icon">🛠</span> 工具系统
        <span class="count" id="count-tool">0</span>
      </div>
      <div class="sidebar-item" onclick="filterProducts('multi',this)">
        <span class="icon">📁</span> 多文件包
        <span class="count" id="count-multi">0</span>
      </div>
      <div class="sidebar-section">状态</div>
      <div class="sidebar-item" onclick="filterProducts('active',this)">
        <span class="icon">✅</span> 已发布
        <span class="count" id="count-active">0</span>
      </div>
      <div class="sidebar-item" onclick="filterProducts('draft',this)">
        <span class="icon">📝</span> 草稿
        <span class="count" id="count-draft">0</span>
      </div>
      <div class="sidebar-section">操作</div>
      <div class="sidebar-item" onclick="exportData()">
        <span class="icon">💾</span> 导出数据
      </div>
      <div class="sidebar-item" onclick="importData()">
        <span class="icon">📂</span> 导入数据
      </div>
    </aside>

    <main class="main">
      <div class="stat-row">
        <div class="stat-card">
          <div class="stat-val" id="stat-total">0</div>
          <div class="stat-label">产品总数</div>
        </div>
        <div class="stat-card" style="border-left-color:#3A7FCA">
          <div class="stat-val" id="stat-active">0</div>
          <div class="stat-label">已发布</div>
        </div>
        <div class="stat-card" style="border-left-color:#9a60b4">
          <div class="stat-val" id="stat-sent">0</div>
          <div class="stat-label">已发送链接</div>
        </div>
        <div class="stat-card" style="border-left-color:#E24B4A">
          <div class="stat-val" id="stat-draft">0</div>
          <div class="stat-label">草稿</div>
        </div>
      </div>

      <div class="filter-bar">
        <input class="search-input" id="search-input" placeholder="搜索产品名称或描述..." oninput="renderProducts()">
        <select class="filter-select" id="filter-type" onchange="renderProducts()">
          <option value="">全部类型</option>
          <option value="html">看板/报告</option>
          <option value="tool">工具系统</option>
          <option value="multi">多文件包</option>
        </select>
        <select class="filter-select" id="filter-sort" onchange="renderProducts()">
          <option value="newest">最新添加</option>
          <option value="name">按名称</option>
          <option value="type">按类型</option>
        </select>
      </div>

      <div class="product-grid" id="product-grid"></div>
      <div id="empty-state" style="display:none">
        <div class="big">📦</div>
        <div class="title">还没有产品</div>
        <div class="sub">点击右上角「添加产品」开始管理你的产品库</div>
      </div>
    </main>
  </div>
</div>

<!-- ═══════════════ 客户端预览视图 ═══════════════ -->
<div class="view" id="view-preview">
  <div class="preview-page" id="preview-container"></div>
</div>

<!-- ═══════════════ 添加/编辑产品 Modal ═══════════════ -->
<div class="modal-overlay" id="product-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">添加新产品</div>
      <button class="modal-close" onclick="closeModal('product-modal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="edit-id">
      <div class="form-group">
        <label class="form-label">产品封面图标 <span>*</span></label>
        <div class="emoji-picker" id="emoji-picker">
          <div class="emoji-opt selected" onclick="selectEmoji(this,'📊')">📊</div>
          <div class="emoji-opt" onclick="selectEmoji(this,'📈')">📈</div>
          <div class="emoji-opt" onclick="selectEmoji(this,'🛠')">🛠</div>
          <div class="emoji-opt" onclick="selectEmoji(this,'📋')">📋</div>
          <div class="emoji-opt" onclick="selectEmoji(this,'💡')">💡</div>
          <div class="emoji-opt" onclick="selectEmoji(this,'🎯')">🎯</div>
          <div class="emoji-opt" onclick="selectEmoji(this,'📁')">📁</div>
          <div class="emoji-opt" onclick="selectEmoji(this,'⚙️')">⚙️</div>
          <div class="emoji-opt" onclick="selectEmoji(this,'🏆')">🏆</div>
          <div class="emoji-opt" onclick="selectEmoji(this,'📱')">📱</div>
          <div class="emoji-opt" onclick="selectEmoji(this,'🔍')">🔍</div>
          <div class="emoji-opt" onclick="selectEmoji(this,'💰')">💰</div>
        </div>
        <input type="hidden" id="form-icon" value="📊">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label">产品名称 <span>*</span></label>
          <input class="form-input" id="form-name" placeholder="如：月度经营分析报告">
        </div>
        <div class="form-group">
          <label class="form-label">产品类型 <span>*</span></label>
          <select class="form-select" id="form-type">
            <option value="html">看板/报告（单HTML）</option>
            <option value="tool">工具系统（可交互）</option>
            <option value="multi">多文件包（ZIP下载）</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">产品描述</label>
        <textarea class="form-input form-textarea" id="form-desc" placeholder="简单描述产品功能..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">产品链接 <span>*</span></label>
        <input class="form-input" id="form-url" placeholder="https://lpz336699-maker.github.io/creamviz/your-product.html">
      </div>
      <div class="form-group">
        <label class="form-label">下载链接（可选）</label>
        <input class="form-input" id="form-download" placeholder="ZIP 包下载地址">
      </div>
      <div class="form-group">
        <label class="form-label">功能亮点（逗号分隔）</label>
        <input class="form-input" id="form-features" placeholder="如：ECharts图表,数据可编辑,可导出">
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">

function loadData() {
  try {
    const d = localStorage.getItem(STORE_KEY);
    if (d) {
      products = JSON.parse(d);
    } else {
      products = getSampleData();
      saveData();
    }
  } catch(e) {
    products = getSampleData();
  }
}
function saveData() { localStorage.setItem(STORE_KEY, JSON.stringify(products)); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ─── 渲染层 ───────────────────────────────────
function renderAll() { renderStats(); renderCounts(); renderProducts(); }

function renderStats() {
  const active = products.filter(p=>p.status==='active').length;
  const draft = products.filter(p=>p.status==='draft').length;
  const sent = products.reduce((a,p)=>a+(p.sentCount||0), 0);
  document.getElementById('stat-total').textContent = products.length;
  document.getElementById('stat-active').textContent = active;
  document.getElementById('stat-sent').textContent = sent;
  document.getElementById('stat-draft').textContent = draft;
  document.getElementById('nav-count').textContent = products.length + ' 个产品';
}

function renderCounts() {
  document.getElementById('count-all').textContent = products.length;
  document.getElementById('count-html').textContent = products.filter(p=>p.type==='html').length;
  document.getElementById('count-tool').textContent = products.filter(p=>p.type==='tool').length;
  document.getElementById('count-multi').textContent = products.filter(p=>p.type==='multi').length;
  document.getElementById('count-active').textContent = products.filter(p=>p.status==='active').length;
  document.getElementById('count-draft').textContent = products.filter(p=>p.status==='draft').length;
}

function getFilteredProducts() {
  let list = [...products];
  const search = document.getElementById('search-input').value.toLowerCase();
  const typeFilter = document.getElementById('filter-type').value;
  const sort = document.getElementById('filter-sort').value;
  if (search) list = list.filter(p => p.name.toLowerCase().includes(search) || (p.desc||'').toLowerCase().includes(search));
  if (typeFilter) list = list.filter(p => p.type === typeFilter);
  if (currentFilter === 'active') list = list.filter(p=>p.status==='active');
  else if (currentFilter === 'draft') list = list.filter(p=>p.status==='draft');
  else if (currentFilter === 'html') list = list.filter(p=>p.type==='html');
  else if (currentFilter === 'tool') list = list.filter(p=>p.type==='tool');
  else if (currentFilter === 'multi') list = list.filter(p=>p.type==='multi');
  if (sort === 'name') list.sort((a,b)=>a.name.localeCompare(b.name));
  else if (sort === 'type') list.sort((a,b)=>a.type.localeCompare(b.type));
  else list.sort((a,b)=>b.createdAt-a.createdAt);
  return list;
}

function renderProducts() {
  const list = getFilteredProducts();
  const grid = document.getElementById('product-grid');
  const empty = document.getElementById('empty-state');
  if (list.length === 0) { grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  grid.innerHTML = list.map(p => {
    const bgMap = { cream:'#F5EDD6', dark:'#0F2D5C', white:'#F5F5F5' };
    return `
    <div class="product-card">
      <div class="card-thumb" style="background:${bgMap[p.color]||bgMap.cream}" onclick="openPreview('${p.id}')">
        <span style="font-size:40px">${p.icon}</span>
        <span class="card-type-badge ${typeColors[p.type]||'type-html'}">${typeLabels[p.type]||p.type}</span>
      </div>
      <div class="card-body">
        <div class="card-name" title="${p.name}">${p.name}</div>
        <div class="card-desc">${p.desc||'暂无描述'}</div>
        <div class="card-footer">
          <div class="card-footer-left">
            <div class="status-dot ${p.status==='active'?'dot-active':'dot-draft'}"></div>
            <span class="status-text">${p.status==='active'?'已发布':'草稿'}</span>
            ${p.sentCount>0?`<span style="font-size:11px;color:var(--text3);margin-left:6px">已发 ${p.sentCount}次</span>`:''}
          </div>
          <div class="card-actions">
            <button class="icon-btn open-btn" title="打开产品" onclick="event.stopPropagation();openPreview('${p.id}')">🔗</button>
            <button class="icon-btn copy-btn" title="复制链接" onclick="event.stopPropagation();quickCopy('${p.id}')">📋</button>
            <button class="icon-btn edit-btn" title="编辑" onclick="event.stopPropagation();openEditModal('${p.id}')">✏️</button>
            <button class="icon-btn del-btn" title="删除" onclick="event.stopPropagation();deleteProduct('${p.id}')">🗑</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function filterProducts(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.sidebar-item').forEach(i=>i.classList.remove('active'));
  if(el) el.classList.add('active');
  renderProducts();
}

// ─── 产品 CRUD ─────────────────────────────────
let selectedEmoji = '📊';
function selectEmoji(el, emoji) {
  document.querySelectorAll('.emoji-opt').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
  selectedEmoji = emoji;
  document.getElementById('form-icon').value = emoji;
}

function openAddModal() {
  document.getElementById('modal-title').textContent = '添加新产品';
  document.getElementById('edit-id').value = '';
  document.getElementById('form-name').value = '';
  document.getElementById('form-desc').value = '';
  document.getElementById('form-url').value = '';
  document.getElementById('form-download').value = '';
  document.getElementById('form-features').value = '';
  document.getElementById('form-type').value = 'html';
  document.getElementById('form-color').value = 'cream';
  document.getElementById('form-status').value = 'active';
  selectEmoji(document.querySelector('.emoji-opt'), '📊');
  document.getElementById('product-modal').classList.add('show');
}

function openEditModal(id) {
  const p = products.find(p=>p.id===id);
  if(!p) return;
  document.getElementById('modal-title').textContent = '编辑产品';
  document.getElementById('edit-id').value = p.id;
  document.getElementById('form-name').value = p.name;
  document.getElementById('form-desc').value = p.desc||'';
  document.getElementById('form-url').value = p.url||'';
  document.getElementById('form-download').value = p.download||'';
  document.getElementById('form-features').value = (p.features||'');
  document.getElementById('form-type').value = p.type||'html';
  document.getElementById('form-color').value = p.color||'cream';
  document.getElementById('form-status').value = p.status||'active';
  const emojiEls = document.querySelectorAll('.emoji-opt');
  emojiEls.forEach(e => e.classList.remove('selected'));
  let found = false;
  emojiEls.forEach(e => { if(e.textContent.trim()===p.icon){e.classList.add('selected');found=true;} });
  if(!found) { emojiEls[0].classList.add('selected'); }
  selectedEmoji = p.icon;
  document.getElementById('form-icon').value = p.icon;
  document.getElementById('product-modal').classList.add('show');
}

function saveProduct() {
  const name = document.getElementById('form-name').value.trim();
  const url = document.getElementById('form-url').value.trim();
  if(!name){ showToast('产品名称不能为空','error'); return; }
  if(!url){ showToast('产品链接不能为空','error'); return; }
  const editId = document.getElementById('edit-id').value;
  const data = {
    icon: document.getElementById('form-icon').value || selectedEmoji || '📊',
    name, type: document.getElementById('form-type').value,
    desc: document.getElementById('form-desc').value.trim(),
    url, download: document.getElementById('form-download').value.trim(),
    features: document.getElementById('form-features').value.trim(),
    color: document.getElementById('form-color').value,
    status: document.getElementById('form-status').value,
  };
  if(editId) {
    const idx = products.findIndex(p=>p.id===editId);
    if(idx>=0) products[idx] = {...products[idx],...data};
    showToast('产品已更新');
  } else {
    products.unshift({id:uid(), sentCount:0, createdAt:Date.now(), ...data});
    showToast('产品已添加');
  }
  saveData(); renderAll(); closeModal('product-modal');
}

function deleteProduct(id) {
  if(!confirm('确认删除这个产品吗？')) return;
  products = products.filter(p=>p.id!==id);
  saveData(); renderAll(); showToast('已删除');
}

// ─── 预览 ────────────────────────────────────
function openPreview(id) {
  const p = products.find(p=>p.id===id);
  if(!p) return;
  window.open(p.url, '_blank');
}

// ─── 发送链接 ─────────────────────────────────
function openSendModal(id) {
  sendProduct = products.find(p=>p.id===id);
  if(!sendProduct) return;
  document.getElementById('send-icon').textContent = sendProduct.icon;
  document.getElementById('send-name').textContent = sendProduct.name;
  document.getElementById('send-type-label').textContent = typeLabels[sendProduct.type]||sendProduct.type;
  document.getElementById('send-preview-url').textContent = sendProduct.url||'';
  if(sendProduct.download) {
    document.getElementById('send-download-url').textContent = sendProduct.download;
    document.getElementById('send-download-row').style.display='flex';
  } else {
    document.getElementById('send-download-row').style.display='none';
  }
  document.getElementById('send-note').value='';
  document.getElementById('send-modal').classList.add('show');
}

function buildPreviewUrl(p) { return p.url||''; }

function copyLink(type) {
  const text = type==='preview'
    ? document.getElementById('send-preview-url').textContent
    : document.getElementById('send-download-url').textContent;
  navigator.clipboard.writeText(text).then(()=>{
    showToast('链接已复制到剪贴板');
  });
}

function quickCopy(id) {
  const p = products.find(p=>p.id===id);
  if(!p) return;
  navigator.clipboard.writeText(p.url||'').then(()=>showToast('产品链接已复制'));
}

function recordSend() {
  if(!sendProduct) return;
  const idx = products.findIndex(p=>p.id===sendProduct.id);
  if(idx>=0) products[idx].sentCount = (products[idx].sentCount||0)+1;
  saveData(); renderAll();
  showToast('已记录发送', 'success');
  closeModal('send-modal');
}

// ─── 客户端预览页 ──────────────────────────────
function renderPreviewPage(id) {
  const p = products.find(p=>p.id===id);
  const container = document.getElementById('preview-container');
  if(!p) {
    container.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:12px;color:var(--text3)"><div style="font-size:48px">🔍</div><div style="font-size:16px">找不到该产品</div><a href="${window.location.pathname}" style="color:var(--blue);font-size:13px">返回首页</a></div>`;
    return;
  }
  const features = p.features ? p.features.split(',').filter(Boolean) : [];
  const featureIcons = ['✨','📊','🛠','💡','🔗','📁','⚡','🎯','📈','🔄'];
  container.innerHTML = `
    <nav class="preview-nav">
      <span class="preview-nav-logo">CreamViz by Alin</span>
      <span class="preview-nav-sep">/</span>
      <span class="preview-nav-name">${p.name}</span>
    </nav>
    <div class="preview-hero">
      <div class="preview-type-chip">${typeIcons[p.type]||'📦'} ${typeLabels[p.type]||p.type}</div>
      <div class="preview-title">${p.name}</div>
      <div class="preview-desc">${p.desc||'专业产品，为您精心打造。'}</div>
      <div class="preview-actions">
        ${p.url&&p.url!=='#'?`<a class="preview-btn preview-btn-main" href="${p.url}" target="_blank">▶ 打开产品</a>`:''}
        ${p.download?`<a class="preview-btn preview-btn-sub" href="${p.download}" download>⬇ 下载文件</a>`:''}
        <button class="preview-btn preview-btn-sub" onclick="window.history.back()">← 返回</button>
      </div>
    </div>
    <div class="preview-content">
      ${features.length>0?`
        <div class="preview-section-title">功能亮点</div>
        <div class="preview-features">
          ${features.map((f,i)=>`<div class="preview-feature-item"><span class="preview-feature-icon">${featureIcons[i%featureIcons.length]}</span><div class="preview-feature-text">${f.trim()}</div></div>`).join('')}
        </div>`:''}
      <div class="preview-watermark">© CreamViz by Alin · 专业数据可视化产品</div>
    </div>`;
  document.title = p.name + ' · CreamViz';
}

// ─── 路由 ─────────────────────────────────────
function router() {
  const hash = location.hash;
  if(hash.startsWith('#preview/')) {
    const id = hash.slice(9);
    document.getElementById('view-admin').classList.remove('active');
    document.getElementById('view-preview').classList.add('active');
    renderPreviewPage(id);
  } else {
    document.getElementById('view-preview').classList.remove('active');
    document.getElementById('view-admin').classList.add('active');
    document.title = 'CreamViz 产品中台';
  }
}
window.addEventListener('hashchange', router);

// ─── 导入导出 ──────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(products,null,2)],{type:'application/json'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download = 'creamviz_products_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
  showToast('数据已导出');
}
function importData() { document.getElementById('import-input').click(); }
function handleImport(e) {
  const file = e.target.files[0]; if(!file) return;
  const r = new FileReader(); r.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if(Array.isArray(data)) { products=[...data,...products]; saveData(); renderAll(); showToast('导入成功，共'+data.length+'个产品'); }
      else showToast('格式不正确','error');
    } catch(err) { showToast('解析失败','error'); }
  }; r.readAsText(file); e.target.value='';
}

// ─── 工具函数 ──────────────────────────────────
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
let toastTimer;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show' + (type?' '+type:'');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

// ─── 初始化 ────────────────────────────────────
loadData();
renderAll();
router();
</script>
</body>
</html>
